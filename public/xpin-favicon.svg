<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="#000000"/>
  
  <!-- X Text - White -->
  <text x="128" y="340" font-family="Arial, sans-serif" font-size="280" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">X</text>
  
  <!-- PIN Text - Magenta/Pink -->
  <text x="380" y="340" font-family="Arial, sans-serif" font-size="280" font-weight="bold" fill="#FF00FF" text-anchor="middle" dominant-baseline="middle">PIN</text>
  
  <!-- Accent line -->
  <line x1="160" y1="380" x2="380" y2="380" stroke="#00FFFF" stroke-width="8"/>
  
  <!-- Subtitle text -->
  <text x="256" y="450" font-family="Arial, sans-serif" font-size="36" fill="#999999" text-anchor="middle" letter-spacing="4">HYPER-COMPETITIVE</text>
</svg>